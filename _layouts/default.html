<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- INLINE CSS -->
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      padding: 1.5rem;
    }

    table {
      display: block;
      width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px 10px;
      text-align: left;
    }

    th {
      background-color: #f5f5f5;
      font-weight: 600;
    }

    h2 {
      margin-top: 2.5rem;
    }

    h3 {
      margin-top: 1.5rem;
    }

    .footer-image {
      max-width: 250px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 1rem;
    }

    .main-nav {
  margin-bottom: 1.5rem;
}

.nav-image img {
  width: 100%;
  max-height: 100px;
  object-fit: cover;
  display: block;
}

.main-nav ul {
  list-style: none;
  display: flex;
  gap: 1rem;
  padding: 0.5rem 0;
  margin: 0;
  justify-content: center;
}

.main-nav a {
  text-decoration: none;
  font-weight: 500;
}
  </style>
</head>


<body>

<header>
  <h1>Electrical Layout Dataset Directory</h1>
</header>
  
<nav class="main-nav">
  <div class="nav-image">
    <img
      src="{{ '/assets/images/domain.jpg' | relative_url }}"
      alt="Electrical Layouts Dataset Domains"
    />
  </div>

  <ul>
    <li><a href="{{ '/' | relative_url }}">Overview</a></li>
    <li><a href="{{ '/format/' | relative_url }}">Format</a></li>
    <li><a href="{{ '/scale/' | relative_url }}">Scale</a></li>
    <li><a href="{{ '/objective/' | relative_url }}">Objective</a></li>
    <li><a href="{{ '/annotation/' | relative_url }}">Annotation</a></li>
  </ul>
</nav>
  
<main>
  {{ content }}
</main>

<footer>
  <img
    src="{{ '/assets/images/electrical_datasets.jpg' | relative_url }}"
    alt="Electrical dataset logo"
    class="footer-image"
  />
</footer>
  
</body>
</html>
